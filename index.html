<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>QR</title>
    <link rel="icon" href="./img/icon.png">
    <link rel="apple-touch-icon" href="./img/icon.png">
    <link href="./img/icon.png" rel="shortcut icon" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="container">
    <div class="topbar">
        <input id="search" placeholder="검색">
        <select id="sort" onchange="loadQR()">
            <option value="new">최신순</option>
            <option value="old">오래된순</option>
            <option value="scan">스캔순</option>
        </select>
    </div>

    <div id="qr-list"></div>
</div>

<div class="fab" onclick="openCreateModal()">+</div>

<div id="create-modal" class="modal hidden">
    <div class="modal-box">
        <h3>QR 생성</h3>
        <input id="name" placeholder="QR 이름" autocomplete="off">
        <input id="url" placeholder="이동할 URL" autocomplete="off">
        <div class="modal-actions">
            <button onclick="createQR()">생성</button>
            <button class="cancel-btn" onclick="closeCreateModal()">취소</button>
        </div>
    </div>
</div>

<div id="delete-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-text">정말 삭제하시겠습니까?</div>
        <div class="modal-actions">
            <button id="delete-confirm" class="delete-btn">삭제</button>
            <button class="cancel-btn" onclick="closeDelete()">취소</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
